name: Android CI & Build

# 触发条件：推送到主分支或手动触发
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub 网页手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 1. 检出代码
        uses: actions/checkout@v4

      # 2. 配置 Java 环境 (使用你图中的 JDK 17)
      - name: 2. 配置 Java 环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # 强烈推荐的官方稳定分发版
          java-version: '17'

      # 3. 自动化配置 Gradle 并开启缓存（核心：大幅减少因下载依赖超时导致的报错）
      - name: 3. 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3

      # 4. 给 Gradle 赋予执行权限
      - name: 4. 授权 Gradle 执行权限
        run: chmod +x ./gradlew

      # 5. 编译 Debug 版 APK (自带 --stacktrace 报错追踪)
      - name: 5. 编译 Debug 版 APK
        run: ./gradlew assembleDebug --stacktrace --line-ending=lf

      # 6. 自动收集编译产物（也就是你的“手机下载圣地”）
      - name: 6. 上传 APK 至 GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
