name: Android CI & Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 自动递归拉取所有依赖的子模块（解决 CMake 找不到 android.c 问题）
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 2. 配置 Java 环境并开启 Gradle 缓存
      - name: 2. 配置 Java 环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. 赋予 Gradle 脚本执行权限
      - name: 3. 授权 Gradle 执行权限
        run: chmod +x ./gradlew

      # 4. 编译 :tunnel 模块的 Debug 版 APK (自带全堆栈日志追踪)
      - name: 4. 编译 Debug 版 APK
        run: ./gradlew :tunnel:assembleDebug --stacktrace

      # 5. 自动发布到 Release 页面（当推送 v* 标签时触发）
      - name: 5. 自动发布到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tunnel/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. 日常 Push 自动上传编译产物到 Actions 底部（日常备份下载圣地）
      - name: 6. 自动上传到 Artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: Tunnel-Debug-APK
          path: tunnel/build/outputs/apk/debug/*.apk
