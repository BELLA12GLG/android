name: 自动编译 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# 【核心配置】赋予打包机写入 Release 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 配置 Java 环境 (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: 3. 赋予 Gradle 执行权限
      run: chmod +x ./gradlew

    - name: 4. 编译 Debug 版 APK
      run: ./gradlew assembleDebug

    - name: 5. 自动发布到 Release（手机下载圣地）
      run: |
        gh release delete latest --yes || true
        gh release create latest **/build/outputs/apk/**/*.apk --title "最新编译的手机安装包" --notes "手机端直接点击下方 apk 即可下载安装" --target master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
