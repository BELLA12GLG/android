name: 🔨 Build Android APK

on:
  push:
    branches: [ master, main, feature/* ]
    tags: [ 'v*' ]                    # tag 推送时自动打 Release
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:                   # 手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true             # 新提交自动取消旧的构建

jobs:

  # ============================================================
  # Job 1: 代码检查（不编译，快速反馈）
  # ============================================================
  lint:
    name: 🧹 Lint Check
    runs-on: ubuntu-24.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🔍 Run Lint
        run: ./gradlew lintDebug --no-daemon

      - name: 📤 Upload Lint Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  # ============================================================
  # Job 2: 单元测试（并行执行，不依赖 Lint）
  # ============================================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🧪 Run Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 📤 Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/

  # ============================================================
  # Job 3: 构建 Debug + Release APK（依赖前两步通过）
  # ============================================================
  build:
    name: 📦 Build APKs
    runs-on: ubuntu-24.04
    needs: [lint, test]

    env:
      APK_DEBUG_PATH:   app/build/outputs/apk/debug/app-debug.apk
      APK_RELEASE_PATH: app/build/outputs/apk/release/app-release-unsigned.apk

    steps:
      # -------- 检出 --------
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # 获取全部 git 历史，方便生成 changelog

      # -------- JDK --------
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # -------- Decode Keystore（Release 签名，可选）--------
      # 如果没有 keystore，Release 只打 unsigned
      - name: 🔐 Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      # -------- 赋予权限 --------
      - name: 🔧 Grant Gradlew Permission
        run: chmod +x ./gradlew

      # -------- Debug 构建 --------
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # -------- Release 构建 --------
      - name: 🔨 Build Release APK
        run: |
          if [ -f release.keystore ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=release.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              --no-daemon
          else
            echo "⚠️  No keystore configured — building unsigned Release APK"
            ./gradlew assembleRelease --no-daemon
          fi

      # -------- 检查产物 --------
      - name: 📋 Verify APK Output
        run: |
          echo "====== Debug APK ======"
          ls -lh $APK_DEBUG_PATH  2>/dev/null || echo "❌ Debug APK not found"
          echo ""
          echo "====== Release APK ======"
          ls -lh $APK_RELEASE_PATH 2>/dev/null || echo "❌ Release APK not found"

      # -------- 获取构建信息 --------
      - name: 📊 Build Info
        id: info
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"          >> $GITHUB_OUTPUT
          echo "commit_sha=$(git rev-parse --short HEAD)"              >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%s)"                  >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF##*/}"                              >> $GITHUB_OUTPUT
          echo "debug_size=$(stat -c%s $APK_DEBUG_PATH 2>/dev/null || echo 0)"         >> $GITHUB_OUTPUT
          echo "release_size=$(stat -c%s $APK_RELEASE_PATH 2>/dev/null || echo 0)"     >> $GITHUB_OUTPUT

      # -------- 上传 Debug APK --------
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.APK_DEBUG_PATH }}
          retention-days: 7

      # -------- 上传 Release APK --------
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ env.APK_RELEASE_PATH }}
          retention-days: 30

      # -------- 打印构建摘要 --------
      - name: 📊 Build Summary
        run: |
          echo "============================================"
          echo "  🔨 Android APK Build Complete"
          echo "============================================"
          echo ""
          echo "  📅 Time:    ${{ steps.info.outputs.build_time }}"
          echo "  🌿 Branch:  ${{ steps.info.outputs.branch }}"
          echo "  🔖 Commit:  ${{ steps.info.outputs.commit_sha }}"
          echo "  📝 Message: ${{ steps.info.outputs.commit_msg }}"
          echo ""
          echo "  📦 Artifacts:"
          echo "     Debug:   ${{ steps.info.outputs.debug_size }} bytes"
          echo "     Release: ${{ steps.info.outputs.release_size }} bytes"
          echo "============================================"

  # ============================================================
  # Job 4: 发布 Release（仅 tag 触发）
  # ============================================================
  release:
    name: 🚀 Publish Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: 📥 Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 🔨 Android APK — ${{ github.ref_name }}

            | 类型 | 文件 |
            |------|------|
            | Debug | `app-debug.apk` |
            | Release | `app-release.apk` |

            > ⚠️ Release APK 未签名，请使用 `apksigner` 签名后发布到应用商店。
          files: |
            app-debug.apk
            app-release.apk
          generate_release_notes: true      # ============================================================
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ============================================================
      # Step 4: 构建 Debug APK
      # ============================================================
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # ============================================================
      # Step 5: 上传 APK 作为构建产物（可选）
      # ============================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/**/*.apk
